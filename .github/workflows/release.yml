name: Release and Publish

on:
  push:
    tags:
      - "release/**"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release, for example release/v21.0.0"
        required: true
        type: string

jobs:
  create_release:
    name: create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          case "${TAG_NAME}" in
            release/v*) ;;
            *)
              echo "Tag must start with release/v"
              exit 1
              ;;
          esac
          git fetch origin main --depth=1
          git fetch --tags --force
          TAG_COMMIT="$(git rev-list -n 1 "${TAG_NAME}")"
          if ! git branch -r --contains "${TAG_COMMIT}" | grep -q "origin/main"; then
            echo "Tag ${TAG_NAME} does not point to a commit on origin/main"
            exit 1
          fi
          echo "RELEASE_NAME=${TAG_NAME#release/}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --generate-notes \
            --verify-tag

  publish:
    name: publish to pypi
    needs: create_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions with twine
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
